<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">Sky Island theme preview</title>
  <desc id="desc">Clouds, a floating green island, a glowing sun, and a reading book in a bright sky.</desc>
  <defs>
    <linearGradient id="skyBg" x1="70" y1="20" x2="560" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#39BDF8"/>
      <stop offset=".6" stop-color="#8BDBFF"/>
      <stop offset="1" stop-color="#FFF0B8"/>
    </linearGradient>
    <linearGradient id="islandTop" x1="185" y1="205" x2="455" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#78D978"/>
      <stop offset=".55" stop-color="#3FA769"/>
      <stop offset="1" stop-color="#25825A"/>
    </linearGradient>
    <linearGradient id="earth" x1="210" y1="238" x2="430" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B7793B"/>
      <stop offset="1" stop-color="#7C3F1E"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#075985" flood-opacity=".22"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="640" height="360" rx="30" fill="url(#skyBg)"/>
  <circle cx="528" cy="74" r="45" fill="#FFE67A" filter="url(#glow)"/>
  <circle cx="528" cy="74" r="28" fill="#FFD84D"/>
