    <path d="M155 56c9-14 31-13 39 1 14-7 33 1 35 17 17 1 28 12 24 24H126c-6-19 7-38 29-42z" opacity=".72"/>
  </g>
  <g filter="url(#softShadow)">
    <ellipse cx="320" cy="238" rx="153" ry="45" fill="url(#islandTop)"/>
    <path d="M183 235c36 80 91 104 138 104 56 0 110-42 136-105-70 30-201 29-274 1z" fill="url(#earth)"/>
