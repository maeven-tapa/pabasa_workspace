<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">Space Reading theme preview</title>
  <desc id="desc">Planets, stars, a rocket, and a glowing book in deep space.</desc>
  <defs>
    <radialGradient id="bg" cx="72%" cy="28%" r="78%">
      <stop stop-color="#7C3AED"/>
      <stop offset=".5" stop-color="#312E81"/>
      <stop offset="1" stop-color="#111827"/>
    </radialGradient>
    <linearGradient id="planet" x1="382" y1="87" x2="542" y2="230" gradientUnits="userSpaceOnUse">
      <stop stop-color="#93C5FD"/>
      <stop offset=".55" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <filter id="glow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#020617" flood-opacity=".45"/>
    </filter>
  </defs>
  <rect width="640" height="360" rx="30" fill="url(#bg)"/>
  <g fill="#FFF7AD" filter="url(#glow)">
    <circle cx="82" cy="65" r="4"/><circle cx="155" cy="117" r="3"/><circle cx="261" cy="48" r="4"/><circle cx="565" cy="70" r="3"/><circle cx="541" cy="285" r="4"/><circle cx="112" cy="289" r="3"/>
    <path d="M486 250l7 16 17 6-17 6-7 16-7-16-17-6 17-6z"/>
    <path d="M190 213l5 12 13 4-13 5-5 12-5-12-13-5 13-4z"/>
  </g>
  <g transform="translate(386 85)" filter="url(#shadow)">
    <circle cx="76" cy="76" r="62" fill="url(#planet)"/>
    <path d="M12 89c56 34 132 33 182-3" fill="none" stroke="#E9D5FF" stroke-width="13" stroke-linecap="round" opacity=".8" transform="rotate(-18 76 76)"/>
    <circle cx="51" cy="51" r="13" fill="#BFDBFE" opacity=".75"/>
    <circle cx="95" cy="101" r="9" fill="#1E40AF" opacity=".35"/>
  </g>
  <g transform="translate(145 102) rotate(-28)" filter="url(#shadow)">
    <path d="M68 0c39 34 49 80 30 139L30 71C43 40 55 16 68 0z" fill="#F8FAFC" stroke="#A78BFA" stroke-width="6"/>
    <circle cx="70" cy="58" r="17" fill="#38BDF8" stroke="#312E81" stroke-width="5"/>
    <path d="M28 74 0 120l44-15zM101 101l7 48-38-29z" fill="#F97316" stroke="#7C2D12" stroke-width="5"/>
    <path d="M23 126c-14 20-15 37-6 51 14-6 25-19 32-40z" fill="#FDE047" opacity=".95"/>
  </g>
  <g transform="translate(252 235)" filter="url(#shadow)">
    <path d="M0 23c31-19 58-16 82 8v78c-25-22-52-25-82-8z" fill="#FDF2F8" stroke="#C084FC" stroke-width="6"/>
    <path d="M82 31c24-24 51-27 82-8v78c-30-17-57-14-82 8z" fill="#E0E7FF" stroke="#C084FC" stroke-width="6"/>
    <path d="M82 31v78" stroke="#A855F7" stroke-width="5"/>
