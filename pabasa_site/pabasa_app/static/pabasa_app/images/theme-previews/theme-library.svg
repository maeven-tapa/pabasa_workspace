<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">Magic Library theme preview</title>
  <desc id="desc">Bookshelves, glowing books, sparkles, an arch, and magical reading light.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="20" x2="560" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4C1D95"/>
      <stop offset=".55" stop-color="#9333EA"/>
      <stop offset="1" stop-color="#F0ABFC"/>
    </linearGradient>
    <radialGradient id="glowFill" cx="50%" cy="54%" r="52%">
      <stop stop-color="#FEF9C3" stop-opacity=".9"/>
      <stop offset=".45" stop-color="#F0ABFC" stop-opacity=".35"/>
      <stop offset="1" stop-color="#F0ABFC" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-25%" y="-25%" width="150%" height="160%">
