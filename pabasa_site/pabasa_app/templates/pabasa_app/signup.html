{% extends "pabasa_app/base.html" %}
{% load static %}

{% block page_css %}
<link rel="stylesheet" href="{% static 'pabasa_app/signup.css' %}">
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-stack">
        <section class="auth-hero">
            <div class="auth-intro">
                <p class="eyebrow">Access Portal</p>
            </div>
        </section>

        <section class="auth-grid">
            <article class="auth-card reveal">
                <div class="card-title">
                    <h2>Create a Account</h2>
                </div>
                <p>Select your role to start the signup process.</p>
                <div class="role-buttons">
                    <a class="button-primary" href="{% url 'teacher_signup' %}">Teacher Sign Up</a>
                    <a class="button-secondary" href="{% url 'student_signup' %}">Student Sign Up</a>
                </div>
                <p class="auth-switch">
                    Already have an account?
                    <a class="text-link" href="{% url 'auth' %}">Login</a>
                </p>
            </article>
        </section>
    </div>
</div>
{% endblock %}
