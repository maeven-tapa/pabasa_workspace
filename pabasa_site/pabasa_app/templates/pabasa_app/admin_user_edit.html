{% extends "pabasa_app/admin_base.html" %}

{% block content %}
<div class="admin-panel">
    <div class="d-flex flex-wrap justify-content-between align-items-start gap-3 mb-4">
        <div>
            <a class="btn btn-sm btn-outline-secondary mb-3" href="{% if managed_role == 'student' %}{% url 'admin_student_detail' managed_user.id %}{% else %}{% url 'admin_teacher_detail' managed_user.id %}{% endif %}">
                <i class="bi bi-arrow-left me-1"></i>Back
            </a>
            <h2 class="h4 fw-bold mb-1">Edit {{ managed_user_name|default:managed_user.custom_id }}</h2>
            <p class="text-secondary mb-0">{{ managed_user.get_role_display }}</p>
        </div>
    </div>

    {% if error_message %}
    <div class="alert alert-danger" role="alert">
        {{ error_message }}
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="row g-3">
            <div class="col-12 col-md-6">
                <label class="form-label fw-bold" for="firstName">First name</label>
                <input class="form-control" id="firstName" type="text" name="first_name" value="{{ managed_user.first_name }}" required>
            </div>
            <div class="col-12 col-md-3">
                <label class="form-label fw-bold" for="middleInitial">Middle initial</label>
                <input class="form-control" id="middleInitial" type="text" name="middle_initial" maxlength="1" value="{{ managed_user.middle_initial }}">
            </div>
            <div class="col-12 col-md-6">
                <label class="form-label fw-bold" for="lastName">Last name</label>
                <input class="form-control" id="lastName" type="text" name="last_name" value="{{ managed_user.last_name }}" required>
            </div>
            <div class="col-12 col-md-3">
                <label class="form-label fw-bold" for="suffix">Suffix</label>
                <input class="form-control" id="suffix" type="text" name="suffix" value="{{ managed_user.suffix }}">
            </div>
            <div class="col-12 col-md-6">
                <label class="form-label fw-bold" for="username">Username</label>
                <input class="form-control" id="username" type="text" name="custom_id" value="{{ managed_user.custom_id }}" required>
            </div>
            <div class="col-12 col-md-6">
                <label class="form-label fw-bold" for="email">Email</label>
                <input class="form-control" id="email" type="email" name="email" value="{{ managed_user.email }}" required>
            </div>
        </div>

        <div class="d-flex flex-wrap justify-content-end gap-2 mt-4">
            <a class="btn btn-outline-secondary" href="{% if managed_role == 'student' %}{% url 'admin_student_detail' managed_user.id %}{% else %}{% url 'admin_teacher_detail' managed_user.id %}{% endif %}">Cancel</a>
            <button class="btn btn-primary" type="submit">
                <i class="bi bi-check2 me-1"></i>Save changes
            </button>
        </div>
    </form>
</div>
{% endblock %}
