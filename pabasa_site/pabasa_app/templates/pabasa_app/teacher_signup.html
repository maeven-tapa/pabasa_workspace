{% extends "pabasa_app/base.html" %}
{% load static %}

{% block page_css %}
<link rel="stylesheet" href="{% static 'pabasa_app/teacher_signup.css' %}">
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-stack">
        <section class="auth-hero">
            <div class="auth-intro">
                <p class="eyebrow">Access Portal</p>
            </div>
        </section>

        <section class="auth-grid">
            <article class="auth-card reveal">
                <div class="card-title">
                    <h1>Create a Teacher Account</h1>
                </div>
                <p class="auth-switch">
                    Already have an account?
                    <a class="text-link" href="{% url 'auth' %}">Login</a>
                </p>
                <form class="auth-form">
                    <label class="form-field">
                        <span>Full name</span>
                        <input type="text" name="full_name" placeholder="Enter full name" required>
                    </label>
                    <label class="form-field">
                        <span>Email address</span>
                        <input type="email" name="email" placeholder="you@example.com" required>
                    </label>
                    <label class="form-field">
                        <span>Password</span>
                        <input type="password" name="password" placeholder="Create a password" required>
                    </label>
                    <label class="form-field">
                        <span>Confirm password</span>
                        <input type="password" name="confirm_password" placeholder="Confirm password" required>
                    </label>
                    <div class="form-actions">
                        <a class="button-ghost" href="{% url 'signup' %}">Back</a>
                        <button class="button-primary" type="submit">Create Account</button>
                    </div>
                </form>
            </article>
        </section>
    </div>
</div>
{% endblock %}
