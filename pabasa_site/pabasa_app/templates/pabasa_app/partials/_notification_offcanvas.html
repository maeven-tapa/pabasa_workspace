<div class="offcanvas offcanvas-end notif-pane" tabindex="-1" id="{{ notification_pane_id }}" aria-labelledby="{{ notification_pane_label_id }}">
    <div class="offcanvas-header">
        <div class="notif-title-wrap">
            <div class="notif-title-icon" aria-hidden="true"><i class="bi bi-bell-fill"></i></div>
            <h5 class="offcanvas-title" id="{{ notification_pane_label_id }}">
                Notifications
                <span class="notif-header-badge is-hidden" data-notification-header-badge>0</span>
            </h5>
        </div>
        <div class="notif-pane-actions">
            {% if show_clear_notifications %}
            <button type="button" class="btn btn-sm btn-outline-primary notif-clear-btn" id="{{ notification_clear_button_id|default:'clearNotificationsBtn' }}">
                <i class="bi bi-trash3" aria-hidden="true"></i>
                <span>Clear</span>
            </button>
            {% endif %}
            <button type="button" class="btn-close notif-close-btn" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
    </div>
    <div class="offcanvas-body p-0">
        <div id="{{ notification_mount_id }}" class="p-3" data-notifications-mount="{{ notification_mount_name|default:'pane' }}"></div>
    </div>
</div>
{% if show_clear_notifications %}
<div class="modal fade notif-confirm-modal" id="{{ notification_confirm_modal_id|default:'clearNotificationsConfirmModal' }}" tabindex="-1" aria-labelledby="{{ notification_confirm_modal_label_id|default:'clearNotificationsConfirmModalLabel' }}" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-body text-center">
                <div class="notif-confirm-icon" aria-hidden="true">
                    <i class="bi bi-trash3"></i>
                </div>
                <h5 class="notif-confirm-title" id="{{ notification_confirm_modal_label_id|default:'clearNotificationsConfirmModalLabel' }}">Clear all notifications?</h5>
                <p class="notif-confirm-copy">This action cannot be undone.</p>
            </div>
            <div class="modal-footer border-0 justify-content-center notif-confirm-actions">
                <button type="button" class="btn btn-outline-secondary notif-confirm-cancel" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn notif-confirm-submit" data-notification-clear-confirm>Clear All</button>
            </div>
        </div>
    </div>
</div>
{% endif %}
