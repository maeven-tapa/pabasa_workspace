<header class="dashboard-topbar sticky-top d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center gap-3">
        <button class="btn btn-outline-secondary d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#dashboardSidebar" aria-controls="dashboardSidebar">
            <i class="bi bi-list"></i>
        </button>
        <div>
            <h1 class="h5 mb-0">{{ page_title|default:"Dashboard" }}</h1>
            {% if page_date %}
            <small class="text-muted">{{ page_date }}</small>
            {% endif %}
        </div>
    </div>
    <div class="d-flex align-items-center gap-3">
        <button class="btn btn-link text-dark p-0 position-relative" type="button" data-bs-toggle="offcanvas" data-bs-target="#notificationPane" aria-label="View notifications" style="width: 42px; height: 42px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.9); box-shadow: 0 8px 18px rgba(16, 70, 110, 0.08);">
            <i class="bi bi-bell fs-5" style="color: var(--dash-primary-deep);"></i>
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill" id="notifBadge" style="display: none; font-size: 0.6rem; padding: 0.35em 0.5em; background: linear-gradient(135deg, var(--dash-accent) 0%, var(--dash-accent-strong) 100%); color: var(--dash-primary-deep); box-shadow: 0 6px 14px rgba(245, 184, 0, 0.24);">0</span>
        </button>
    </div>
</header>
