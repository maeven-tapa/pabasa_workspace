<header class="dashboard-topbar sticky-top d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center gap-3">
        <button class="btn btn-outline-secondary d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#dashboardSidebar" aria-controls="dashboardSidebar">
            <i class="bi bi-list"></i>
        </button>
        <div>
            <h1 class="h5 mb-0">{{ page_title|default:"Dashboard" }}</h1>
            {% if page_date %}
            <small class="text-muted">{{ page_date }}</small>
            {% endif %}
        </div>
    </div>
    <div class="d-flex align-items-center gap-3">
        <button class="btn btn-link text-dark p-0 position-relative" type="button" data-bs-toggle="offcanvas" data-bs-target="#notificationPane" aria-label="View notifications">
            <i class="bi bi-bell fs-5"></i>
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="notifBadge" style="display: none; font-size: 0.6rem; padding: 0.35em 0.5em;">0</span>
        </button>
    </div>
</header>
