<header class="bg-white border-bottom sticky-top px-3 px-md-4 py-3 d-flex align-items-center justify-content-between" style="z-index: 1020;">
    <div class="d-flex align-items-center gap-3">
        <button class="btn btn-outline-secondary d-lg-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#dashboardSidebar" aria-controls="dashboardSidebar">
            <i class="bi bi-list"></i>
        </button>
        <div>
            <h1 class="h5 mb-0">{{ page_title|default:"Dashboard" }}</h1>
            {% if page_date %}
            <small class="text-muted">{{ page_date }}</small>
            {% endif %}
        </div>
    </div>

    <div class="d-flex align-items-center gap-2">
        <button class="btn btn-light dash-top-btn" type="button" data-bs-toggle="offcanvas" data-bs-target="#notificationPane" aria-controls="notificationPane" aria-label="Open notifications">
            <i class="bi bi-bell"></i>
        </button>
        <button class="btn btn-light dash-top-btn" type="button" data-bs-toggle="offcanvas" data-bs-target="#profilePane" aria-controls="profilePane" aria-label="Open profile menu">
            <i class="bi bi-person-circle"></i>
        </button>
    </div>
</header>
