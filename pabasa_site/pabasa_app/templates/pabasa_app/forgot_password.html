{% extends "pabasa_app/base.html" %}
{% load static %}

{% block extra_head %}
<style>
    body {
        background:
            linear-gradient(135deg, rgba(0, 0, 0, 0.35) 0%, rgba(0, 0, 0, 0.25) 100%),
            radial-gradient(ellipse at 50% 50%, rgba(31, 111, 139, 0.15) 0%, transparent 80%),
            url("{% static 'pabasa_app/images/read.jpg' %}") no-repeat center center fixed;
        background-size: cover;
    }

    .account-card {
        background: rgba(255, 255, 255, 0.75) !important;
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
    }

    .account-card .text-secondary {
        color: #000000 !important;
    }
</style>
{% endblock %}

{% block content %}
<section class="account-stage">
    <div class="col-12 col-md-9 col-lg-5">
        <article class="account-card card">
            <div class="card-body p-4">
                <span class="modern-chip mb-2">Password Recovery</span>
                <h1 class="h4 mb-2">Forgot your password?</h1>
                <p class="text-secondary">Enter your email. If you are a student, please enter your parent’s email.</p>
                <form action="{% url 'forgot_password_otp' %}" method="get" class="d-grid gap-3">
                    <div>
                        <label class="form-label">Email or Parent Email</label>
                        <input class="form-control" type="email" name="email" placeholder="name@example.com" required>
                    </div>
                    <button class="btn btn-primary" type="submit">Next: OTP</button>
                </form>
                <a class="small d-inline-block mt-3" href="{% url 'auth' %}">Back to login</a>
            </div>
        </article>
    </div>
</section>
{% endblock %}
