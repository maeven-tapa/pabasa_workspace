{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block page_title %}Grow with PABASA{% endblock %}</title>
    <link rel="icon" type="image/x-icon" href="{% static 'pabasa_app/images/favicon.ico' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quattrocento+Sans:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --brand-primary: #0f172a;
            --brand-primary-2: #1e293b;
            --brand-accent: #0e7490;
            --brand-accent-2: #155e75;
            --brand-soft-1: #eef6f8;
            --brand-soft-2: #e2e8f0;
            --brand-ink: #0f172a;
            --brand-muted: #64748b;
            --brand-line: rgba(148, 163, 184, 0.28);

            --bs-primary: #0f172a;
            --bs-primary-rgb: 15, 23, 42;
            --bs-link-color: #0e7490;
            --bs-link-hover-color: #155e75;
        }

        body {
            background: linear-gradient(180deg, #f7f9fc 0%, #eef3f7 52%, #f8fafc 100%);
            background-attachment: fixed;
            font-family: "Quattrocento Sans", sans-serif;
            color: var(--brand-ink);
        }

        .modern-hero {
            background: linear-gradient(135deg, #ffffff 0%, var(--brand-soft-1) 100%);
            border: 1px solid var(--brand-line);
            border-radius: 1.25rem;
            padding: 2rem;
        }

        .modern-surface {
            border: 1px solid var(--brand-line);
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 14px 38px rgba(15, 23, 42, 0.075);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .modern-surface:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 46px rgba(15, 23, 42, 0.12);
        }

        .modern-chip {
            background-color: var(--brand-soft-1);
            color: var(--brand-accent-2);
            border-radius: 999px;
            font-weight: 600;
            padding: 0.4rem 0.8rem;
            font-size: 0.78rem;
            display: inline-block;
        }

        .modern-nav-wrap {
            background:
                linear-gradient(135deg, rgba(15, 23, 42, 0.98), rgba(30, 41, 59, 0.96)),
                radial-gradient(circle at 12% 0%, rgba(14, 116, 144, 0.28), transparent 28%);
            border-bottom: 1px solid rgba(226, 232, 240, 0.12);
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.16);
        }

        .modern-nav-wrap .navbar {
            padding-top: 0.85rem;
            padding-bottom: 0.85rem;
        }

        .navbar-layout {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 1rem;
            width: 100%;
        }

        .nav-center {
            display: flex;
            justify-content: center;
        }

        .nav-right {
            display: flex;
            justify-content: flex-end;
        }

        .brand-pill {
            color: #fff;
            font-weight: 700;
            letter-spacing: 0.04em;
            padding: 0.35rem 0.85rem;
            border: 1px solid rgba(226, 232, 240, 0.22);
            border-radius: 999px;
            text-decoration: none;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        .brand-pill:hover {
            background-color: rgba(14, 116, 144, 0.16);
            border-color: rgba(125, 211, 252, 0.38);
            color: #fff;
        }

        .brand-pill.brand-logo {
            border-radius: 0.8rem;
            padding: 0.35rem 0.55rem;
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            letter-spacing: 0.08em;
        }

        .brand-mark {
            width: 30px;
            height: 30px;
            border-radius: 0.65rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            background: linear-gradient(145deg, var(--brand-accent) 0%, var(--brand-accent-2) 100%);
            border: 1px solid rgba(226, 232, 240, 0.22);
            font-size: 0.9rem;
            line-height: 1;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
        }

        .brand-mark i {
            color: #fff;
        }

        .brand-text {
            font-size: 0.95rem;
            text-transform: uppercase;
        }

        .nav-link-modern {
            color: rgba(226, 232, 240, 0.9);
            font-weight: 500;
            border-radius: 999px;
            padding: 0.45rem 0.9rem;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .nav-link-modern:hover {
            color: #fff;
            background-color: rgba(14, 116, 144, 0.16);
        }

        .account-cta {
            border-radius: 999px;
            font-weight: 600;
            padding-inline: 1rem;
        }

        .account-stage {
            min-height: calc(100vh - 230px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 0;
        }

        .account-card {
            border: 0;
            border-radius: 1.1rem;
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
            overflow: hidden;
        }

        .account-card .card-body {
            padding: 1.5rem;
        }

        .btn {
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: var(--brand-primary);
            border-color: var(--brand-primary);
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.18);
        }

        .btn-primary:hover,
        .btn-primary:focus,
        .btn-primary:active {
            background-color: #1e293b !important;
            border-color: #1e293b !important;
            box-shadow: 0 0 0 0.2rem rgba(15, 23, 42, 0.18) !important;
        }

        .btn-outline-primary {
            color: var(--brand-accent-2);
            border-color: rgba(14, 116, 144, 0.35);
        }

        .btn-outline-primary:hover,
        .btn-outline-primary:focus,
        .btn-outline-primary:active {
            color: #fff !important;
            background-color: var(--brand-accent-2) !important;
            border-color: var(--brand-accent-2) !important;
            box-shadow: 0 0 0 0.2rem rgba(14, 116, 144, 0.18) !important;
        }

        .btn-light.account-cta {
            color: #0f172a;
            background: #ffffff;
            border: 1px solid rgba(226, 232, 240, 0.72);
        }

        .btn-light.account-cta:hover {
            color: #fff;
            background-color: var(--brand-accent-2);
            border-color: var(--brand-accent-2);
        }

        .site-footer {
            background:
                linear-gradient(135deg, rgba(15, 23, 42, 0.98), rgba(30, 41, 59, 0.96)) !important;
            border-top: 1px solid rgba(226, 232, 240, 0.12) !important;
            color: #cbd5e1;
        }

        .site-footer .text-muted {
            color: #cbd5e1 !important;
        }

        @media (min-width: 768px) {
            .account-card .card-body {
                padding: 2rem;
            }
        }

        @media (max-width: 991.98px) {
            .navbar-layout {
                display: flex;
                flex-wrap: wrap;
            }

            .nav-center,
            .nav-right {
                width: 100%;
                justify-content: flex-start;
                margin-top: 0.5rem;
            }

            .nav-right {
                margin-top: 0.25rem;
            }

            .account-stage {
                min-height: 100vh;
                padding: 1rem 0;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100">
    <header class="modern-nav-wrap sticky-top shadow-sm">
        <nav class="navbar navbar-expand-lg navbar-dark">
            <div class="container">
                <div class="navbar-layout">
                    <a class="brand-pill brand-logo" href="{% url 'home' %}">
                        <span class="brand-mark"><i class="bi bi-journal-check"></i></span>
                        <span class="brand-text">PABASA</span>
                    </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="mainNavbar">
                    <div class="nav-center flex-grow-1">
                        <ul class="navbar-nav align-items-lg-center gap-lg-2">
                            <li class="nav-item"><a class="nav-link nav-link-modern" href="{% url 'pabasa_info' %}">What is PABASA</a></li>
                            <li class="nav-item"><a class="nav-link nav-link-modern" href="{% url 'about' %}">About Us</a></li>
                        </ul>
                    </div>
                    <div class="nav-right">
                        <a class="btn btn-light btn-sm account-cta" href="{% url 'auth' %}">My Account</a>
                    </div>
                </div>
                </div>
            </div>
        </nav>
    </header>
    <main class="flex-grow-1 py-4">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>
    <footer class="site-footer py-3 mt-auto">
        <div class="container small text-center text-muted fw-semibold">
            PABASA | © 2026
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
