{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block page_title %}PABASA{% endblock %}</title>
    <link rel="icon" type="image/png" href="{% static 'pabasa_app/images/pabasalogo.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'pabasa_app/vendor/bootstrap-icons/bootstrap-icons.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Quattrocento+Sans:wght@400;700&family=Coiny&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* 60-30-10 palette: soft paper, deep reading teal, warm amber. */
            --palette-60: #f7f9f6;
            --palette-60-alt: #edf4f2;
            --palette-60-panel: #ffffff;
            --palette-30: #164e63;
            --palette-30-deep: #0f172a;
            --palette-30-soft: #dcecef;
            --palette-10: #d97706;
            --palette-10-soft: #fff4df;

            --brand-primary: var(--palette-30-deep);
            --brand-primary-2: #1e293b;
            --brand-accent: #0e7490;
            --brand-accent-2: var(--palette-30);
            --brand-warm: var(--palette-10);
            --brand-warm-soft: var(--palette-10-soft);
            --brand-soft-1: var(--palette-60-alt);
            --brand-soft-2: #d9e7e9;
            --brand-ink: #10212b;
            --brand-muted: #5f6f76;
            --brand-line: rgba(22, 78, 99, 0.18);

            --bs-primary: var(--palette-30);
            --bs-primary-rgb: 22, 78, 99;
            --bs-link-color: var(--palette-30);
            --bs-link-hover-color: #0e7490;
        }

        body {
            background: linear-gradient(180deg, var(--palette-60) 0%, var(--palette-60-alt) 58%, #fbfcfa 100%);
            background-attachment: fixed;
            font-family: "Quattrocento Sans", sans-serif;
            color: var(--brand-ink);
        }

        .modern-hero {
            background: linear-gradient(135deg, #ffffff 0%, var(--brand-soft-1) 100%);
            border: 1px solid var(--brand-line);
            border-radius: 1.25rem;
            padding: 2rem;
        }

        .modern-surface {
            border: 1px solid var(--brand-line);
            border-radius: 1rem;
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 14px 38px rgba(15, 23, 42, 0.075);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .modern-surface:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 46px rgba(15, 23, 42, 0.12);
        }

        .modern-chip {
            background-color: var(--brand-warm-soft);
            color: #92400e;
            border-radius: 999px;
            font-weight: 600;
            padding: 0.4rem 0.8rem;
            font-size: 0.78rem;
            display: inline-block;
        }

        .modern-nav-wrap {
            background:
                linear-gradient(135deg, rgba(15, 23, 42, 0.98), rgba(22, 78, 99, 0.96)),
                radial-gradient(circle at 12% 0%, rgba(217, 119, 6, 0.22), transparent 28%);
            border-bottom: 1px solid rgba(226, 232, 240, 0.12);
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.16);
        }

        .modern-nav-wrap .navbar {
            padding-top: 0.85rem;
            padding-bottom: 0.85rem;
        }

        .navbar-layout {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 1rem;
            width: 100%;
        }

        .nav-center {
            display: flex;
            justify-content: center;
        }

        .nav-right {
            display: flex;
            justify-content: flex-end;
        }

        .brand-pill {
            color: #fff;
            font-weight: 700;
            letter-spacing: 0.04em;
            padding: 0.35rem 0.85rem;
            border: 1px solid rgba(226, 232, 240, 0.22);
            border-radius: 999px;
            text-decoration: none;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        .brand-pill:hover {
            background-color: rgba(14, 116, 144, 0.16);
            border-color: rgba(125, 211, 252, 0.38);
            color: #fff;
        }

        .brand-pill.brand-logo {
            border-radius: 0.8rem;
            padding: 0.35rem 0.55rem;
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            letter-spacing: 0.08em;
        }

        .brand-mark {
            width: 30px;
            height: 30px;
            border-radius: 0.65rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            background: linear-gradient(145deg, var(--palette-30) 0%, var(--palette-10) 100%);
            border: 1px solid rgba(226, 232, 240, 0.22);
            font-size: 0.9rem;
            line-height: 1;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
        }

        .brand-mark i {
            color: #fff;
        }

        .brand-text {
            font-size: 0.95rem;
            text-transform: uppercase;
        }

        .nav-link-modern {
            color: rgba(226, 232, 240, 0.9);
            font-weight: 500;
            border-radius: 999px;
            padding: 0.45rem 0.9rem;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .nav-link-modern:hover {
            color: #fff;
            background-color: rgba(217, 119, 6, 0.18);
        }

        .account-cta {
            border-radius: 999px;
            font-weight: 600;
            padding-inline: 1rem;
        }

        .account-stage {
            min-height: calc(100vh - 230px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 0;
        }

        .account-card {
            position: relative;
            border: 0;
            border-radius: 1.1rem;
            background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
            overflow: hidden;
        }

        .account-card::after {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 20;
            background: rgba(148, 163, 184, 0.34);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.08s ease;
        }

        .account-card.is-card-transitioning::after {
            opacity: 1;
        }

        .account-card .card-body {
            position: relative;
            z-index: 1;
            padding: 1.5rem;
        }

        .account-loading-state {
            display: flex;
            min-height: 220px;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.85rem;
            text-align: center;
        }

        .account-loading-spinner {
            width: 44px;
            height: 44px;
            border: 4px solid rgba(84, 194, 240, 0.22);
            border-top-color: #54c2f0;
            border-radius: 50%;
            animation: accountLoadingSpin 0.85s linear infinite;
        }

        .account-loading-text {
            color: #12394f;
            font-weight: 800;
            letter-spacing: 0;
        }

        .public-page-loader {
            position: fixed;
            inset: 0;
            z-index: 99999;
            display: grid;
            place-items: center;
            background: #ffffff;
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
            transition: opacity 0.16s ease, visibility 0.16s ease;
        }

        body.public-page-preloading .public-page-loader,
        .public-page-loader.is-visible {
            opacity: 1;
            pointer-events: auto;
            visibility: visible;
        }

        .public-page-loader__content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        .public-page-loader__spinner {
            width: 42px;
            height: 42px;
            border: 4px solid rgba(84, 194, 240, 0.22);
            border-top-color: #54c2f0;
            border-radius: 50%;
            animation: accountLoadingSpin 0.85s linear infinite;
        }

        @keyframes accountLoadingSpin {
            to {
                transform: rotate(360deg);
            }
        }

        .btn {
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: var(--palette-30);
            border-color: var(--palette-30);
            box-shadow: 0 10px 24px rgba(22, 78, 99, 0.2);
        }

        .btn-primary:hover,
        .btn-primary:focus,
        .btn-primary:active {
            background-color: #0f3d4d !important;
            border-color: #0f3d4d !important;
            box-shadow: 0 0 0 0.2rem rgba(22, 78, 99, 0.18) !important;
        }

        .btn-outline-primary {
            color: var(--brand-accent-2);
            border-color: rgba(14, 116, 144, 0.35);
        }

        .btn-outline-primary:hover,
        .btn-outline-primary:focus,
        .btn-outline-primary:active {
            color: #fff !important;
            background-color: var(--brand-accent-2) !important;
            border-color: var(--brand-accent-2) !important;
            box-shadow: 0 0 0 0.2rem rgba(14, 116, 144, 0.18) !important;
        }

        .btn-light.account-cta {
            color: #0f172a;
            background: #ffffff;
            border: 1px solid rgba(226, 232, 240, 0.72);
        }

        .btn-light.account-cta:hover {
            color: #fff;
            background-color: var(--brand-accent-2);
            border-color: var(--brand-accent-2);
        }

        .site-footer {
            background:
                linear-gradient(135deg, rgba(15, 23, 42, 0.98), rgba(30, 41, 59, 0.96)) !important;
            border-top: 1px solid rgba(226, 232, 240, 0.12) !important;
            color: #cbd5e1;
        }

        .site-footer .text-muted {
            color: #cbd5e1 !important;
        }

        @media (min-width: 768px) {
            .account-card .card-body {
                padding: 2rem;
            }
        }

        @media (max-width: 991.98px) {
            .navbar-layout {
                display: flex;
                flex-wrap: wrap;
            }

            .nav-center,
            .nav-right {
                width: 100%;
                justify-content: flex-start;
                margin-top: 0.5rem;
            }

            .nav-right {
                margin-top: 0.25rem;
            }

            .account-stage {
                min-height: 100vh;
                padding: 1rem 0;
            }
        }
        
        .brand-pill.brand-logo{
            display:inline-flex;
            align-items:center;
            gap:0;
            padding:0.35rem 0.6rem;
        }

        .brand-logo svg{
            width:34px;
            height:34px;
            margin-right:-6px;
            flex-shrink:0;
        }

        .brand-text{
            display:flex;
            align-items:center;
            gap:0;
            font-size:1.35rem;
            font-weight:900;
            letter-spacing:0;
            line-height:1;
        }

        .logo-blue{
            color:#2EA8E5;
        }

        .logo-yellow{
            color:#F4B400;
        }

        /* ── PABASA parrot logo (Coiny style) ── */
        .pabasa-logo-link {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            gap: 0;
            flex-shrink: 0;
        }

        .pabasa-logo-link:hover {
            opacity: 0.88;
        }

        .pabasa-logo-svg {
            width: 64px;
            height: 54px;
            flex-shrink: 0;
        }

        .pabasa-logo-letters {
            display: flex;
            align-items: center;
            margin-left: -20px;
            margin-top: 4px;
        }

        .pabasa-logo-letters span {
            font-family: 'Coiny', cursive;
            font-size: 2.1rem;
            display: inline-block;
            -webkit-text-stroke: 5px #10466E;
            paint-order: stroke fill;
            letter-spacing: -2px;
            filter: drop-shadow(0px 2px 0px rgba(16,70,110,0.18));
            line-height: 1;
        }

        .lc-blue   { color: #54C2F0; }
        .lc-yellow { color: #FFD639; }
        /* ── end logo ── */

        /* ── cute logo-color accent pass ── */

        /* Navbar: keep dark but add a warm yellow underline glow + blue shimmer */
        .modern-nav-wrap {
            border-bottom: 2px solid rgba(255, 214, 57, 0.35) !important;
        }

        /* Nav links: hover turns logo-blue */
        .nav-link-modern:hover {
            color: #54C2F0 !important;
            background-color: rgba(84, 194, 240, 0.12) !important;
        }

        /* My Account button: cute yellow pill */
        .btn-light.account-cta {
            background: #FFD639 !important;
            border: 2px solid #FFD639 !important;
            border-radius: 999px !important;
            color: #10466E !important;
            font-family: 'Baloo 2', 'Nunito', cursive !important;
            font-weight: 800 !important;
            padding: 0.3rem 1.1rem !important;
            box-shadow: 0 4px 14px rgba(255, 214, 57, 0.38) !important;
        }

        .btn-light.account-cta:hover {
            background: #F5B800 !important;
            border-color: #F5B800 !important;
            color: #0f3a57 !important;
            transform: translateY(-1px) !important;
            box-shadow: 0 6px 18px rgba(255, 214, 57, 0.42) !important;
        }

        /* Ensure the modern-nav variant used on home/about also applies globally */
        .modern-nav-wrap .btn.btn-light.btn-sm.account-cta {
            background: #FFD639 !important;
            border: 2px solid #FFD639 !important;
            border-radius: 999px !important;
            box-shadow: 0 4px 14px rgba(255, 214, 57, 0.38) !important;
            color: #10466E !important;
            font-family: 'Baloo 2', 'Nunito', cursive !important;
            font-weight: 800 !important;
            padding: 0.3rem 1.1rem !important;
        }

        .modern-nav-wrap .btn.btn-light.btn-sm.account-cta:hover {
            background: #F5B800 !important;
            border-color: #F5B800 !important;
            transform: translateY(-1px) !important;
        }

        /* Primary buttons: logo blue */
        .btn-primary {
            background-color: #2199CC !important;
            border-color: #2199CC !important;
            box-shadow: 0 8px 22px rgba(33, 153, 204, 0.28) !important;
        }

        .btn-primary:hover,
        .btn-primary:focus,
        .btn-primary:active {
            background-color: #187aaa !important;
            border-color: #187aaa !important;
            box-shadow: 0 10px 26px rgba(33, 153, 204, 0.34) !important;
        }

        /* Outline buttons: logo blue border */
        .btn-outline-primary {
            color: #2199CC !important;
            border-color: rgba(33, 153, 204, 0.45) !important;
        }

        .btn-outline-primary:hover,
        .btn-outline-primary:focus,
        .btn-outline-primary:active {
            background-color: #2199CC !important;
            border-color: #2199CC !important;
            color: #fff !important;
        }

        /* modern-chip: logo yellow soft */
        .modern-chip {
            background-color: rgba(255, 214, 57, 0.18) !important;
            color: #7a5c00 !important;
            border: 1px solid rgba(255, 214, 57, 0.45) !important;
        }

        /* modern-surface hover: blue glow */
        .modern-surface:hover {
            border-color: rgba(84, 194, 240, 0.38) !important;
            box-shadow: 0 18px 46px rgba(33, 153, 204, 0.13) !important;
        }

        /* Footer: navy from logo */
        .site-footer {
            background: linear-gradient(135deg, #10466E 0%, #0b2e47 100%) !important;
            border-top: 2px solid rgba(255, 214, 57, 0.28) !important;
        }

        /* Page background: faint sky-blue tint */
        body {
            background: linear-gradient(180deg, #f0f8ff 0%, #eaf4f8 55%, #f5fbfd 100%) !important;
        }

        /* ── end cute pass ── */
    </style>
    {% block extra_head %}{% endblock %}
</head>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script>
        (() => {
            const transitionDuration = 500;
            const minimumPreloadTime = 450;
            const preloadStartedAt = Date.now();
            let navigationPending = false;

            const loader = document.getElementById("publicPageLoader");

            const showPublicLoader = () => {
                loader?.classList.add("is-visible");
                loader?.setAttribute("aria-hidden", "false");
            };

            const hidePublicLoader = () => {
                loader?.classList.remove("is-visible");
                loader?.setAttribute("aria-hidden", "true");
                document.body.classList.remove("public-page-preloading");
                navigationPending = false;
            };

            const releasePreload = () => {
                const elapsed = Date.now() - preloadStartedAt;
                const remaining = Math.max(0, minimumPreloadTime - elapsed);
                window.setTimeout(() => {
                    window.requestAnimationFrame(hidePublicLoader);
                }, remaining);
            };

            if (document.readyState === "complete") {
                releasePreload();
            } else {
                window.addEventListener("load", releasePreload, { once: true });
            }

            document.addEventListener("click", (event) => {
                if (navigationPending) return;

                const clickTarget = event.target instanceof Element ? event.target : event.target?.parentElement;
                const link = clickTarget?.closest("a[href]");
                if (!link) return;
                if (event.defaultPrevented || event.button !== 0 || event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) return;
                if (link.target || link.hasAttribute("download")) return;

                const href = link.getAttribute("href") || "";
                if (!href || href.startsWith("#") || href.startsWith("javascript:") || href.startsWith("mailto:") || href.startsWith("tel:")) return;

                let targetUrl;
                try {
                    targetUrl = new URL(link.href, window.location.origin);
                } catch (error) {
                    return;
                }
                if (targetUrl.origin !== window.location.origin) return;
                if (targetUrl.pathname === window.location.pathname && targetUrl.search === window.location.search) return;

                event.preventDefault();
                navigationPending = true;
                link.closest(".account-card")?.classList.add("is-card-transitioning");
                showPublicLoader();

                window.setTimeout(() => {
                    window.location.href = targetUrl.href;
                }, transitionDuration);
            });

            window.addEventListener("pageshow", (event) => {
                if (event.persisted) hidePublicLoader();
            });
        })();
    </script>
</body>
</html>
