<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P.A.B.A.S.A</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --brand-primary: #6e10ee;
            --brand-primary-2: #8a3ffc;
            --brand-soft-1: #f4ecff;
            --brand-soft-2: #eee3ff;

            --bs-primary: #6e10ee;
            --bs-primary-rgb: 110, 16, 238;
            --bs-link-color: #6e10ee;
            --bs-link-hover-color: #5d0dd0;
        }

        .modern-hero {
            background: linear-gradient(135deg, #fbf8ff 0%, var(--brand-soft-1) 45%, var(--brand-soft-2) 100%);
            border: 1px solid #e7d8ff;
            border-radius: 1.25rem;
            padding: 2rem;
        }

        .modern-surface {
            border: 1px solid #e9ecf3;
            border-radius: 1rem;
            background-color: #ffffff;
            box-shadow: 0 10px 26px rgba(17, 24, 39, 0.06);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .modern-surface:hover {
            transform: translateY(-3px);
            box-shadow: 0 16px 34px rgba(17, 24, 39, 0.1);
        }

        .modern-chip {
            background-color: var(--brand-soft-1);
            color: var(--brand-primary);
            border-radius: 999px;
            font-weight: 600;
            padding: 0.4rem 0.8rem;
            font-size: 0.78rem;
            display: inline-block;
        }

        .modern-nav-wrap {
            background: linear-gradient(90deg, #5d0dd0 0%, var(--brand-primary) 50%, var(--brand-primary-2) 100%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        }

        .modern-nav-wrap .navbar {
            padding-top: 0.85rem;
            padding-bottom: 0.85rem;
        }

        .navbar-layout {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 1rem;
            width: 100%;
        }

        .nav-center {
            display: flex;
            justify-content: center;
        }

        .nav-right {
            display: flex;
            justify-content: flex-end;
        }

        .brand-pill {
            color: #fff;
            font-weight: 700;
            letter-spacing: 0.04em;
            padding: 0.35rem 0.85rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 999px;
            text-decoration: none;
            transition: background-color 0.2s ease, border-color 0.2s ease;
        }

        .brand-pill:hover {
            background-color: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.6);
            color: #fff;
        }

        .brand-pill.brand-logo {
            border-radius: 0.8rem;
            padding: 0.35rem 0.55rem;
            display: inline-flex;
            align-items: center;
            gap: 0.55rem;
            letter-spacing: 0.08em;
        }

        .brand-mark {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            background: linear-gradient(145deg, #6e10ee 0%, #8a3ffc 100%);
            border: 1px solid rgba(255, 255, 255, 0.35);
            font-size: 0.9rem;
            line-height: 1;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.15);
        }

        .brand-mark i {
            color: #fff;
        }

        .brand-text {
            font-size: 0.95rem;
            text-transform: uppercase;
        }

        .nav-link-modern {
            color: rgba(255, 255, 255, 0.95);
            font-weight: 500;
            border-radius: 999px;
            padding: 0.45rem 0.9rem;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .nav-link-modern:hover {
            color: #fff;
            background-color: rgba(255, 255, 255, 0.14);
        }

        .account-cta {
            border-radius: 999px;
            font-weight: 600;
            padding-inline: 1rem;
        }

        .account-stage {
            min-height: calc(100vh - 230px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem 0;
        }

        .account-card {
            border: 0;
            border-radius: 1.1rem;
            background: linear-gradient(180deg, #ffffff 0%, #faf7ff 100%);
            box-shadow: 0 18px 40px rgba(17, 24, 39, 0.12);
            overflow: hidden;
        }

        .account-card .card-body {
            padding: 1.5rem;
        }

        .btn {
            transition: all 0.2s ease;
        }

        .btn-primary {
            background-color: var(--brand-primary);
            border-color: var(--brand-primary);
        }

        .btn-primary:hover,
        .btn-primary:focus,
        .btn-primary:active {
            background-color: #5d0dd0 !important;
            border-color: #5d0dd0 !important;
            box-shadow: 0 0 0 0.2rem rgba(110, 16, 238, 0.25) !important;
        }

        .btn-outline-primary {
            color: var(--brand-primary);
            border-color: #b899f8;
        }

        .btn-outline-primary:hover,
        .btn-outline-primary:focus,
        .btn-outline-primary:active {
            color: #fff !important;
            background-color: var(--brand-primary) !important;
            border-color: var(--brand-primary) !important;
            box-shadow: 0 0 0 0.2rem rgba(110, 16, 238, 0.2) !important;
        }

        .btn-light.account-cta {
            color: var(--brand-primary);
            border: 1px solid rgba(110, 16, 238, 0.2);
        }

        .btn-light.account-cta:hover {
            color: #fff;
            background-color: #5d0dd0;
            border-color: #5d0dd0;
        }

        @media (min-width: 768px) {
            .account-card .card-body {
                padding: 2rem;
            }
        }

        @media (max-width: 991.98px) {
            .navbar-layout {
                display: flex;
                flex-wrap: wrap;
            }

            .nav-center,
            .nav-right {
                width: 100%;
                justify-content: flex-start;
                margin-top: 0.5rem;
            }

            .nav-right {
                margin-top: 0.25rem;
            }

            .account-stage {
                min-height: auto;
                padding: 0.25rem 0 1rem;
            }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100 bg-light">
    <header class="modern-nav-wrap sticky-top shadow-sm">
        <nav class="navbar navbar-expand-lg navbar-dark">
            <div class="container">
                <div class="navbar-layout">
                    <a class="brand-pill brand-logo" href="{% url 'home' %}">
                        <span class="brand-mark"><i class="bi bi-journal-check"></i></span>
                        <span class="brand-text">PABASA</span>
                    </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="mainNavbar">
                    <div class="nav-center flex-grow-1">
                        <ul class="navbar-nav align-items-lg-center gap-lg-2">
                            <li class="nav-item"><a class="nav-link nav-link-modern" href="{% url 'pabasa_info' %}">What is PABASA</a></li>
                            <li class="nav-item"><a class="nav-link nav-link-modern" href="{% url 'about' %}">About Us</a></li>
                        </ul>
                    </div>
                    <div class="nav-right">
                        <a class="btn btn-light btn-sm account-cta" href="{% url 'auth' %}">My Account</a>
                    </div>
                </div>
                </div>
            </div>
        </nav>
    </header>
    <main class="flex-grow-1 py-4">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>
    <footer class="bg-white border-top py-3 mt-auto">
        <div class="container small text-center text-muted fw-semibold">
            PABASA | © 2026
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
