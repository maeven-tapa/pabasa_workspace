{% extends "pabasa_app/base.html" %}

{% block content %}
<section class="account-stage">
    <div class="col-12 col-md-9 col-lg-5">
        <article class="account-card card">
            <div class="card-body p-4">
                <span class="modern-chip mb-2">Password Recovery</span>
                <h1 class="h4 mb-2">Enter OTP</h1>
                <p class="text-secondary">We sent a one-time password to <strong>{{ email|default:"your email" }}</strong>.</p>
                <form action="{% url 'auth' %}" method="get" class="d-grid gap-3">
                    <div>
                        <label class="form-label">OTP Code</label>
                        <input class="form-control" type="text" name="otp" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" placeholder="Enter 6-digit OTP" required>
                    </div>
                    <button class="btn btn-primary" type="submit">Verify OTP</button>
                </form>
                <div class="d-flex justify-content-between mt-3">
                    <a class="small" href="{% url 'forgot_password' %}">Use a different email</a>
                    <a class="small" href="{% url 'forgot_password_otp' %}?email={{ email|urlencode }}">Resend OTP</a>
                </div>
            </div>
        </article>
    </div>
</section>
{% endblock %}
