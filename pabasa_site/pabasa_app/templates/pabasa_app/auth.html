{% extends "pabasa_app/base.html" %}
{% load static %}

{% block extra_head %}
<style>
    body {
        background:
            linear-gradient(135deg, rgba(8, 24, 38, 0.45), rgba(8, 24, 38, 0.28)),
            url("{% static 'pabasa_app/images/read.jpg' %}") center / cover fixed no-repeat !important;
    }

    .account-card {
        position: relative;
        overflow: hidden;
        border-radius: 1.35rem;
        background: rgba(255, 255, 255, 0.78) !important;
        border: 1px solid rgba(255, 255, 255, 0.58);
        box-shadow: 0 24px 56px rgba(15, 23, 42, 0.26);
        backdrop-filter: blur(14px) saturate(1.08);
        -webkit-backdrop-filter: blur(14px) saturate(1.08);
    }

    .account-card::before {
        content: "";
        display: block;
        height: 0.45rem;
        background: linear-gradient(90deg, #54c2f0, #ffd639);
    }

    .account-card .card-body {
        padding: clamp(1.5rem, 4vw, 2.25rem) !important;
    }

    .account-card h1,
    .account-card h2 {
        color: #0f2f45;
        font-weight: 700;
        letter-spacing: 0;
    }

    .account-card .form-label {
        color: #12394f;
        font-size: 0.92rem;
        font-weight: 700;
        margin-bottom: 0.4rem;
    }

    .account-card .form-control,
    .account-card .form-select {
        min-height: 3rem;
        border-radius: 0.9rem;
        border-color: rgba(16, 70, 110, 0.18);
        background-color: rgba(255, 255, 255, 0.84);
    }

    .account-card .form-control:focus,
    .account-card .form-select:focus {
        border-color: #54c2f0;
        box-shadow: 0 0 0 0.2rem rgba(84, 194, 240, 0.2);
    }

    .account-card .btn {
        min-height: 2.9rem;
        border-radius: 0.9rem;
        font-weight: 700;
    }

    .account-card .text-secondary {
        color: #263f4f !important;
    }

    .password-field {
        position: relative;
    }

    .password-field .form-control {
        padding-right: 5rem;
    }

    .password-toggle-btn {
        position: absolute;
        top: 50%;
        right: 0.9rem;
        transform: translateY(-50%);
        z-index: 2;
        border: 0;
        background: transparent;
        color: #10466e;
        font-size: 0.82rem;
        font-weight: 700;
        line-height: 1;
        padding: 0.25rem 0;
    }

    .password-toggle-btn:hover,
    .password-toggle-btn:focus {
        color: #0f2f45;
        text-decoration: underline;
    }

    .login-loading-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: #ffffff;
        opacity: 0;
        pointer-events: none;
        visibility: hidden;
        transition: opacity 0.18s ease, visibility 0.18s ease;
    }

    .login-loading-screen.is-visible {
        opacity: 1;
        pointer-events: auto;
        visibility: visible;
    }

    .login-loading-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1.5rem;
    }

    .login-loading-logo {
        display: block;
        width: min(180px, 48vw);
        height: auto;
    }

    .login-loading-spinner {
        width: 42px;
        height: 42px;
        border: 4px solid rgba(84, 194, 240, 0.22);
        border-top-color: #54c2f0;
        border-radius: 50%;
        animation: loginSpinner 0.85s linear infinite;
    }

    @keyframes loginSpinner {
        to {
            transform: rotate(360deg);
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="login-loading-screen" id="loginLoadingScreen" aria-live="polite" aria-label="Loading dashboard">
    <div class="login-loading-content">
        <img class="login-loading-logo" src="{% static 'pabasa_app/images/pabasalogo.png' %}" alt="PABASA">
        <div class="login-loading-spinner" role="status" aria-label="Loading"></div>
    </div>
</div>

<section class="account-stage">
    <div class="col-12 col-md-9 col-lg-5 mx-auto">
        <article class="account-card card">
            <div class="card-body p-4">
                <span class="modern-chip mb-2">Access Portal</span>
                <h1 class="h4 mb-2">Welcome back</h1>
                <p class="text-secondary">
                    Log in to continue or <a href="{% url 'signup' %}">create an account</a>.
                </p>
                <form id="loginForm" method="post" class="d-grid gap-3">
                    {% csrf_token %}
                    <div>
                        <label class="form-label">PABASA ID</label>
                        <input
                            class="form-control"
                            id="pabasaId"
                            type="text"
                            name="custom_id"
                            placeholder="TCH-1234 or G2-1234"
                            maxlength="20"
                            pattern="^((ADM|TCH|G2|STD)-[A-Z0-9]{1,12}|PRN-[A-Z0-9]{1,12}-[0-9]{3})$"
                            required
                        >
                    </div>
                    <div>
                        <label class="form-label">Password</label>
                        <div class="password-field">
                        <input class="form-control" id="password" type="password" name="password" placeholder="Enter your password" required>
                        <button class="password-toggle-btn" id="passwordToggle" type="button" aria-pressed="false" aria-label="Show password">Show</button>
                        </div>
                    </div>
                    <div id="errorMessage" class="alert alert-danger d-none" role="alert"></div>
                    <button class="btn btn-primary" id="loginBtn" type="submit">Login</button>
                </form>
                <a class="small d-inline-block mt-3" href="{% url 'forgot_password' %}">Forgot password?</a>
            </div>
        </article>
    </div>
</section>
<script>
    (() => {
        const form = document.getElementById("loginForm");
        const pabasaId = document.getElementById("pabasaId");
        const password = document.getElementById("password");
        const passwordToggle = document.getElementById("passwordToggle");
        const loginBtn = document.getElementById("loginBtn");
        const errorMessage = document.getElementById("errorMessage");
        const loadingScreen = document.getElementById("loginLoadingScreen");
        const pabasaIdPattern = /^((ADM|TCH|G2|STD)-[A-Z0-9]{1,12}|PRN-[A-Z0-9]{1,12}-[0-9]{3})$/;
        const minimumLoadingTime = 500;

        const showLoadingScreen = () => {
            loadingScreen?.classList.add("is-visible");
        };

        const hideLoadingScreen = () => {
            loadingScreen?.classList.remove("is-visible");
        };

        const updatePasswordToggle = () => {
            const isHidden = password.type === "password";
            passwordToggle.textContent = isHidden ? "Show" : "Hide";
            passwordToggle.setAttribute("aria-pressed", String(!isHidden));
            passwordToggle.setAttribute("aria-label", isHidden ? "Show password" : "Hide password");
        };

        passwordToggle.addEventListener("click", () => {
            password.type = password.type === "password" ? "text" : "password";
            updatePasswordToggle();
            password.focus();
        });

        updatePasswordToggle();

        const formatPabasaId = (value) => {
            const cleaned = value.toUpperCase().replace(/[^A-Z0-9-]/g, "").replace(/-+/g, "-").replace(/^-/, "");
            if (!cleaned) return "";

            if (cleaned.startsWith("PRN")) {
                const principalBody = cleaned.slice(3).replace(/^-/, "");
                const [rawSchoolInitials = "", rawSequence = ""] = principalBody.split("-");
                const compactMatch = rawSchoolInitials.match(/^([A-Z]+)(\d*)$/);
                const inferredInitials = compactMatch ? compactMatch[1] : rawSchoolInitials;
                const inferredSequence = compactMatch ? compactMatch[2] : "";
                const schoolInitials = inferredInitials.replace(/[^A-Z0-9]/g, "").slice(0, 12);
                const sequence = (rawSequence || inferredSequence).replace(/\D/g, "").slice(0, 3);
                if (!schoolInitials) return "PRN-";
                if (sequence || principalBody.includes("-") || cleaned.endsWith("-")) return `PRN-${schoolInitials}-${sequence}`;
                return `PRN-${schoolInitials}`;
            }

            const [prefix, ...rest] = cleaned.split("-");
            const suffix = rest.join("");
            if (!prefix) return "";

            if (prefix === "TCH" || prefix === "STD" || prefix === "ADM") {
                const digits = suffix.replace(/\D/g, "").slice(0, 4);
                return digits ? `${prefix}-${digits}` : `${prefix}-`;
            }

            if (prefix === "G2") {
                const digits = suffix.replace(/\D/g, "").slice(0, 4);
                return digits ? `G2-${digits}` : "G2-";
            }

            return cleaned.replace(/-$/, "").slice(0, 20);
        };

        pabasaId.addEventListener("input", () => {
            const formatted = formatPabasaId(pabasaId.value);
            pabasaId.value = formatted;
            pabasaId.setCustomValidity("");
            errorMessage.classList.add("d-none");
        });

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            
            if (!pabasaIdPattern.test(pabasaId.value)) {
                pabasaId.setCustomValidity("PABASA ID must be in the form TCH-1234, G2-1234, or PRN-SES-001.");
                pabasaId.reportValidity();
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = 'Logging in...';
            const loadingStartedAt = Date.now();
            showLoadingScreen();
            
            try {
                const formData = new FormData(form);
                const response = await fetch('{% url "login_user" %}', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    localStorage.setItem("pabasaCurrentUserId", data.custom_id);

                    // Clear old teacher class cache before switching accounts
                    localStorage.removeItem("pabasa_teacher_classes");

                    if (data.email) {
                        localStorage.removeItem(`pabasa_teacher_classes_${data.email}`);
                    }

                    // Save current user email
                    if (data.email) {
                        localStorage.setItem("pabasaUserEmail", data.email);
                    }

                    const elapsedLoadingTime = Date.now() - loadingStartedAt;
                    const remainingLoadingTime = Math.max(0, minimumLoadingTime - elapsedLoadingTime);

                    window.setTimeout(() => {
                        window.location.href = data.redirect_url;
                    }, remainingLoadingTime);
                } else {
                    errorMessage.textContent = data.error || 'Login failed. Please try again.';
                    errorMessage.classList.remove("d-none");
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = 'Login';
                    hideLoadingScreen();
                }
            } catch (error) {
                errorMessage.textContent = 'An error occurred. Please try again.';
                errorMessage.classList.remove("d-none");
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Login';
                hideLoadingScreen();
            }
        });
    })();
</script>
{% endblock %}
