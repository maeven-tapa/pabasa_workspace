{% extends "pabasa_app/base.html" %}
{% load static %}

{% block page_css %}
<link rel="stylesheet" href="{% static 'pabasa_app/auth.css' %}">
{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-stack">
        <section class="auth-hero">
            <div class="auth-intro">
                <p class="eyebrow">Access Portal</p>
            </div>
        </section>

        <section class="auth-grid">
            <article class="auth-card reveal">
                <h1>Welcome to PABASA</h1>
                <p>Log in or <a class="text-link" href="{% url 'signup' %}">create an account</a>.</p>
                <form class="auth-form">
                    <label class="form-field">
                        <span>Email</span>
                        <input type="email" name="email" placeholder="you@example.com" required>
                    </label>
                    <label class="form-field">
                        <span>Password</span>
                        <input type="password" name="password" placeholder="Enter your password" required>
                    </label>
                    <button class="button-primary" type="submit">Login</button>
                </form>
                <a class="text-link forgot-link" href="#">Forgot password?</a>
            </article>
        </section>
    </div>
</div>
{% endblock %}
