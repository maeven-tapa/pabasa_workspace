{% extends "pabasa_app/base.html" %}
{% load static %}

{% block extra_head %}
<style>
    body {
        background:
            linear-gradient(135deg, rgba(8, 24, 38, 0.45), rgba(8, 24, 38, 0.28)),
            url("{% static 'pabasa_app/images/read.jpg' %}") center / cover fixed no-repeat !important;
    }

    .account-card {
        position: relative;
        overflow: hidden;
        border-radius: 1.35rem;
        background: rgba(255, 255, 255, 0.78) !important;
        border: 1px solid rgba(255, 255, 255, 0.58);
        box-shadow: 0 24px 56px rgba(15, 23, 42, 0.26);
        backdrop-filter: blur(14px) saturate(1.08);
        -webkit-backdrop-filter: blur(14px) saturate(1.08);
    }

    .account-card::before {
        content: "";
        display: block;
        height: 0.45rem;
        background: linear-gradient(90deg, #54c2f0, #ffd639);
    }

    .account-card .card-body {
        padding: clamp(1.5rem, 4vw, 2.25rem) !important;
    }

    .account-card h1,
    .account-card h2 {
        color: #0f2f45;
        font-weight: 700;
        letter-spacing: 0;
    }

    .account-card .form-label {
        color: #12394f;
        font-size: 0.92rem;
        font-weight: 700;
        margin-bottom: 0.4rem;
    }

    .account-card .form-control,
    .account-card .form-select {
        min-height: 3rem;
        border-radius: 0.9rem;
        border-color: rgba(16, 70, 110, 0.18);
        background-color: rgba(255, 255, 255, 0.84);
    }

    .account-card .form-control:focus,
    .account-card .form-select:focus {
        border-color: #54c2f0;
        box-shadow: 0 0 0 0.2rem rgba(84, 194, 240, 0.2);
    }

    .account-card .btn {
        min-height: 2.9rem;
        border-radius: 0.9rem;
        font-weight: 700;
    }

    .account-card .text-secondary {
        color: #263f4f !important;
    }
</style>
{% endblock %}

{% block content %}
<section class="account-stage">
    <div class="col-12 col-md-9 col-lg-5 mx-auto">
        <article class="account-card card">
            <div class="card-body p-4">
                <span class="modern-chip mb-2">Access Portal</span>
                <h1 class="h4 mb-2">Welcome back</h1>
                <p class="text-secondary">
                    Log in to continue or <a href="{% url 'signup' %}">create an account</a>.
                </p>
                <form id="loginForm" action="{% url 'dashboard' %}" method="get" class="d-grid gap-3">
                    <div>
                        <label class="form-label">PABASA ID</label>
                        <input
                            class="form-control"
                            id="pabasaId"
                            type="text"
                            name="pabasa_id"
                            placeholder="TCH-1234 or G2-1234"
                            maxlength="8"
                            pattern="^(TCH|G2)-[0-9]{4}$"
                            required
                        >
                    </div>
                    <div>
                        <label class="form-label">Password</label>
                        <input class="form-control" type="password" name="password" placeholder="Enter your password" required>
                    </div>
                    <button class="btn btn-primary" type="submit">Login</button>
                </form>
                <a class="small d-inline-block mt-3" href="{% url 'forgot_password' %}">Forgot password?</a>
            </div>
        </article>
    </div>
</section>
<script>
    (() => {
        const form = document.getElementById("loginForm");
        const pabasaId = document.getElementById("pabasaId");
        const pabasaIdPattern = /^(TCH|G2)-[0-9]{4}$/;

        const formatPabasaId = (value) => {
            const cleaned = value.toUpperCase().replace(/[^A-Z0-9]/g, "");

            if (cleaned.startsWith("TCH")) {
                const digits = cleaned.slice(3).replace(/\D/g, "").slice(0, 4);
                return digits ? `TCH-${digits}` : "TCH-";
            }

            if (cleaned.startsWith("G2")) {
                const digits = cleaned.slice(2).replace(/\D/g, "").slice(0, 4);
                return digits ? `G2-${digits}` : "G2-";
            }

            return cleaned.slice(0, 3);
        };

        pabasaId.addEventListener("input", () => {
            const formatted = formatPabasaId(pabasaId.value);
            pabasaId.value = formatted;
            pabasaId.setCustomValidity("");
        });

        form.addEventListener("submit", (event) => {
            if (!pabasaIdPattern.test(pabasaId.value)) {
                event.preventDefault();
                pabasaId.setCustomValidity("PABASA ID must be TCH-1234 or G2-1234.");
                pabasaId.reportValidity();
                return;
            }

            event.preventDefault();
            
            // Route to appropriate dashboard based on ID prefix
            if (pabasaId.value.startsWith("TCH-")) {
                window.location.href = "{% url 'dashboard_teacher' %}";
            } else if (pabasaId.value.startsWith("G2-")) {
                window.location.href = "{% url 'dashboard' %}";
            }
        });
    })();
</script>
{% endblock %}
